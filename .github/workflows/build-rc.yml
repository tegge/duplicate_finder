name: Build RC

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0-rc1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.Version=${{ inputs.version }}" \
            -o find_duplicates_${{ matrix.suffix }} \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: find_duplicates-${{ inputs.version }}-${{ matrix.suffix }}
          path: find_duplicates_${{ matrix.suffix }}
          if-no-files-found: error
          retention-days: 90

  tag:
    name: Tag commit
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"
